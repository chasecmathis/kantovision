name: kantovision
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      LOG_LEVEL: "DEBUG"
      JSON_LOGS: "false"
    # Override CMD for hot-reload during local dev.
    # Mount source so code changes reflect without rebuilding the image.
    volumes:
      - ./app:/app/app
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload

